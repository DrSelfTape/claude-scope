name: release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Build skill bundle
        run: bash scripts/build-skill.sh

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/scope.skill
          generate_release_notes: true
